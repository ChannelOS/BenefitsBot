<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Channel One Strategies — Employer Discovery Tool</title>
<style>
  :root {
    --green:#0ACE0A; --green-dk:#08a008; --black:#000;
    --white:#fff; --g50:#f9f9f9; --g100:#f0f0f0; --g200:#e0e0e0;
    --g400:#999; --g500:#777; --g600:#555; --g800:#222;
    --amber:#F5A623; --blue:#4A90D9; --purple:#9B59B6;
    --r:8px; --rl:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:#efefef;color:var(--g800);min-height:100vh;padding:1.5rem 1rem 3rem}
  #app{max-width:960px;margin:0 auto}

  /* Header */
  .hdr{background:var(--green);border-radius:var(--rl) var(--rl) 0 0;padding:11px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .hdr-brand{font-weight:700;font-size:14px;color:#000;white-space:nowrap}
  .hdr-div{border-left:1px solid rgba(0,0,0,.2);padding-left:12px;font-size:11px;color:rgba(0,0,0,.6);white-space:nowrap}
  .hdr-inp{flex:1 1 140px;min-width:110px;padding:6px 10px;font-size:13px;background:rgba(255,255,255,.9);border:none;border-radius:6px;color:var(--g800);font-family:inherit}
  .hdr-inp:focus{outline:none;box-shadow:0 0 0 2px rgba(0,0,0,.25)}

  /* Phase tabs */
  .tabs{display:flex;background:var(--g100);border:1px solid var(--g200);border-top:none}
  .tab{flex:1;padding:9px 4px;background:transparent;border:none;border-right:1px solid var(--g200);cursor:pointer;text-align:center}
  .tab:last-child{border-right:none}
  .tab.on{background:var(--white);border-bottom:2.5px solid var(--green)}
  .tab-dot{width:27px;height:27px;border-radius:50%;background:var(--g200);border:1px solid var(--g300,#ccc);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--g500);margin:0 auto 3px}
  .tab.on .tab-dot{background:var(--green);border-color:var(--green);color:#000}
  .tab-lbl{font-size:12px;font-weight:700;color:var(--g500)}
  .tab.on .tab-lbl{color:var(--g800)}
  .tab-sub{font-size:10px;color:var(--g400)}

  /* Panel */
  .panel{background:var(--white);border:1px solid var(--g200);border-top:none;border-radius:0 0 var(--rl) var(--rl);padding:16px;min-height:440px}

  /* Card */
  .card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:12px 14px;margin-bottom:11px}
  .card.gl{border-left:3px solid var(--green)}
  .card.dk{background:var(--g800)}
  .card.tint{background:var(--g50)}

  /* Section head */
  .sh{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;border-bottom:1px solid var(--g100);padding-bottom:5px}

  /* Form */
  .field{margin-bottom:8px}
  .lbl{display:block;font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
  .inp{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--g200);border-radius:6px;background:var(--white);color:var(--g800);font-family:inherit;transition:border-color .15s}
  .inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(10,206,10,.15)}
  textarea.inp{min-height:64px;resize:vertical}
  select.inp{cursor:pointer}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

  /* Checklist */
  .chkrow{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;cursor:pointer;border-bottom:1px solid var(--g100);color:var(--g800);user-select:none}
  .chkrow:last-child{border-bottom:none}
  .chkrow input[type=checkbox]{width:14px;height:14px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
  .chkrow.done span{text-decoration:line-through;color:var(--g400)}

  /* Radio */
  .rgroup{display:flex;gap:14px;margin-bottom:9px}
  .rlbl{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;color:var(--g800)}
  .rlbl input{accent-color:var(--green)}

  /* Step rows (ENGAGE phase) */
  .step-row{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border-radius:8px;margin-bottom:7px;cursor:pointer;user-select:none;border:1.5px solid transparent}
  .step-row.done{opacity:.55}
  .step-row.logistics{background:#f5f5f5;border-color:var(--g200)}
  .step-row.mtnut-row{background:#000;border-color:#111}
  .step-row.bridge-row{background:var(--g50);border-color:var(--g200)}
  .step-check{width:17px;height:17px;accent-color:var(--green);flex-shrink:0;margin-top:3px;cursor:pointer}
  .step-left{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:34px}
  .step-badge{width:32px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .step-badge.bl{background:var(--g200);color:var(--g600)}
  .step-badge.grn{background:var(--green);color:#000}
  .step-badge.grn2{background:#16a34a;color:#fff}
  .step-badge.grn3{background:#15803d;color:#fff}
  .step-timing{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;text-align:center;line-height:1.2}
  .step-timing.tl{color:var(--g400)}
  .step-timing.tm{color:var(--green)}
  .step-timing.tb{color:var(--g400)}
  .step-body{flex:1}
  .step-principle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
  .step-principle.pl{color:var(--g500)}
  .step-principle.pm{color:var(--green)}
  .step-principle.pb{color:var(--g400)}
  .step-label{font-size:13px;font-weight:700;margin-bottom:4px}
  .step-label.ll{color:var(--g800)}
  .step-label.lm{color:#fff}
  .step-label.lb{color:var(--g800)}
  .step-script{font-size:12px;line-height:1.55;font-style:italic}
  .step-script.sm{color:#bbb}
  .step-script.sl{color:var(--g500)}
  .step-script.sb{color:var(--g600)}
  .step-script.done-s{text-decoration:line-through}
  .seg-lbl{font-size:10px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.07em;padding:9px 0 4px;margin-top:2px}

  /* Sub-tabs */
  .stabs{display:flex;gap:6px;margin-bottom:12px}
  .stab{padding:5px 13px;border-radius:6px;border:1px solid var(--g200);background:transparent;color:var(--g800);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .stab.on{background:var(--green);border-color:var(--green);color:#000}

  /* Question cards */
  .qcard{border:1px solid var(--g200);border-radius:8px;overflow:hidden;margin-bottom:7px}
  .qhead{display:flex;gap:9px;align-items:flex-start;padding:9px 11px;background:var(--g50)}
  .qnum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
  .qnum.gr{background:var(--green);color:#000}
  .qnum.bk{background:var(--black);color:var(--green)}
  .qtxt{font-size:13px;font-weight:700;color:var(--g800);line-height:1.4;margin-bottom:3px}
  .qhint{font-size:11px;color:var(--g400);font-style:italic}
  /* Filled indicator */
  .qcard.filled .qhead{background:#e8fbe8}
  .qbody{padding:7px 11px 9px;background:var(--white)}
  /* Note input — NOT tied to oninput to avoid focus-loss bug */
  .note-inp{width:100%;padding:7px 10px;font-size:12px;border:1px solid var(--g200);border-radius:6px;background:var(--white);color:var(--g800);font-family:inherit}
  .note-inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(10,206,10,.15)}

  /* Path cards */
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
  .pcard{padding:10px 12px;border-radius:8px;border:1.5px solid var(--g200);background:var(--white);cursor:pointer;text-align:left;font-family:inherit}
  .pcard.on{border-color:var(--pc,var(--green))}
  .phdr{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .pbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;color:#000}
  .ptitle{font-size:12px;font-weight:700;color:var(--g800)}
  .plead{font-size:11px;color:var(--g400)}

  /* Carrier cards */
  .cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;margin-bottom:13px}
  .ccard{padding:11px 12px;border-radius:8px;border:1px solid var(--g200);border-top:2.5px solid var(--green);background:var(--white)}
  .cname{font-size:13px;font-weight:700;color:var(--g800);margin-bottom:2px}
  .ctype{font-size:11px;font-weight:700;margin-bottom:4px}
  .cprod{font-size:11px;color:var(--g400);line-height:1.5}

  /* Signals box */
  .signals{border-radius:8px;padding:11px 13px;margin-bottom:13px;border:1px solid rgba(0,0,0,.08)}
  .sig-row{display:flex;align-items:baseline;gap:7px;margin-bottom:4px;font-size:12px}
  .sig-tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;color:#000;white-space:nowrap;flex-shrink:0}
  .sig-txt{color:var(--g600);font-style:italic;line-height:1.4}

  /* Detected banner */
  .dbanner{padding:9px 13px;border-radius:8px;margin-bottom:12px;border:1px solid rgba(0,0,0,.08)}
  .dlbl{font-size:10px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .drow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:4px;color:#000}
  .dtitle{font-size:13px;font-weight:700;color:var(--g800)}
  .dlead{font-size:13px;font-weight:700}

  /* Objections */
  .oitem{margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--g100)}
  .oitem:last-child{border-bottom:none;margin-bottom:0}
  .oq{font-size:12px;font-weight:700;color:var(--g800);margin-bottom:3px}
  .oa{font-size:12px;color:var(--g500);font-style:italic;line-height:1.55}

  /* Options */
  .orow{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--g100)}
  .orow:last-child{border-bottom:none}
  .onum{width:21px;height:21px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0}
  .otitle{font-size:13px;font-weight:700;color:var(--g800);margin-bottom:2px}
  .odesc{font-size:12px;color:var(--g400)}

  /* Summary */
  .srow{font-size:13px;color:var(--g400);line-height:2}
  .srow strong{color:var(--g800)}
  .shighlight{color:var(--green);font-weight:700}

  /* Buttons */
  .btn{background:var(--green);color:#000;border:none;padding:8px 20px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;float:right;margin-top:12px}
  .btn:hover{background:var(--green-dk)}
  .btn:active{transform:scale(.98)}
  .cf::after{content:"";display:table;clear:both}

  /* Info bar */
  .ibar{font-size:12px;color:var(--g400);background:var(--g50);border-radius:7px;padding:8px 11px;margin-bottom:11px}

  /* Execute grid */
  .egrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  @media(max-width:640px){
    .g2,.egrid,.pgrid{grid-template-columns:1fr}
    .hdr{flex-direction:column;align-items:flex-start}
  }
</style>
</head>

// ─── Path detection — reads ALL notes ───────────────────────────────────
function detectPath() {
  if (S.medOffered === 'no') return 'A';
  if (!S.medOffered) return null;

  // Collect all text from every note field
  const allNotes = [
    S.pain1, S.pain2, S.notes,
    ...Object.values(S.qNotes),
  ].join(' ').toLowerCase();

  // Weighted scoring
  let scores = {A:0, B:0, C:0, D:0};

  // Cost / affordability signals → B
  if (/cost|premium|afford|expens|price|budget|increase|higher|shift|cut|too much|rate/.test(allNotes)) scores.B += 3;
  // Retention / talent signals → C
  if (/turn|retain|talent|recruit|compet|keep|lose|lost|left|quit|hire/.test(allNotes)) scores.C += 3;
  // Communication / awareness signals → D
  if (/communic|enroll|understand|aware|educat|don't know|confus|particip|engage|portal|tech/.test(allNotes)) scores.D += 3;
  // No benefits / can't afford → A boosters
  if (/never offer|no benefit|can't afford|couldn't afford|too small|not yet/.test(allNotes)) scores.A += 4;

  // Pain1/pain2 specific weight
  const pain = (S.pain1 + ' ' + S.pain2).toLowerCase();
  if (/cost|premium|afford|expens/.test(pain)) scores.B += 4;
  if (/turn|retain|talent|competit|recruit|hire|keep/.test(pain)) scores.C += 4;
  if (/communic|enroll|understand|aware|particip/.test(pain)) scores.D += 4;

  // Find winner
  const top = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  if (top[0][1] === 0) return 'C'; // default
  return top[0][0];
}

// Build "signals" list for Guide — what notes drove the path
function buildSignals(path) {
  const signals = [];
  const allText = [S.pain1, S.pain2, S.notes, ...Object.values(S.qNotes)];

  const keywordMap = {
    B: [/cost/,/premium/,/afford/,/expens/,/increase/,/higher/,/shift/,/cut/,/budget/],
    C: [/turn/,/retain/,/talent/,/recruit/,/compet/,/keep/,/lose/,/lost/,/quit/,/hire/],
    D: [/communic/,/enroll/,/understand/,/aware/,/particip/,/engage/,/portal/,/confus/],
    A: [/no benefit/,/never offer/,/can't afford/,/too small/,/not yet/],
  };

  const keys = keywordMap[path] || [];
  DQS.forEach(q => {
    const note = (S.qNotes[q.n] || '').trim();
    if (!note) return;
    if (keys.some(rx => rx.test(note.toLowerCase()))) {
      signals.push({ src: `Q${q.n}`, text: note.length > 80 ? note.slice(0,77)+'…' : note });
    }
  });
  if (S.pain1) signals.push({ src:'Pain 1', text: S.pain1 });
  if (S.pain2) signals.push({ src:'Pain 2', text: S.pain2 });
  const freeNote = (S.notes||'').trim();
  if (freeNote) signals.push({ src:'Notes', text: freeNote.length > 80 ? freeNote.slice(0,77)+'…' : freeNote });

  return signals;
}

function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function field(lbl, html){ return `<div class="field"><label class="lbl">${lbl}</label>${html}</div>` }
function inp(id, val, ph, type='text'){
  // Uses onchange (fires on blur) so typing isn't interrupted by re-renders
  return `<input class="inp" id="fi_${id}" type="${type}" placeholder="${ph}" value="${e(val||'')}" onchange="sv('${id}',this.value)">`
}
function selEl(id, val, opts){
  return `<select class="inp" id="fi_${id}" onchange="sv('${id}',this.value)">
    <option value="">Select…</option>
    ${opts.map(o=>`<option${val===o?' selected':''}>${e(o)}</option>`).join('')}
  </select>`
}
function chkEl(key, checked, lbl, fn){
  return `<label class="chkrow${checked?' done':''}">
    <input type="checkbox" ${checked?'checked':''} onchange="${fn}">
    <span>${lbl}</span>
  </label>`
}

`;
}

function buildSummaryText(){

  IQS.forEach(q=>{ const n=(S.qNotes['i'+q.n]||'').trim(); if(n) allNotes.push('  ICHRA Q'+q.n+': '+n); });
  const gaps = buildGaps();

  const lines = [
    'CHANNEL ONE STRATEGIES',
    'DISCOVERY MEETING SUMMARY',
    '='.repeat(50),
    company   ? 'Company:    '+company   : '',
    presenter ? 'Presenter:  '+presenter : '',
    'Date:       '+new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    '',
    p ? ['RECOMMENDED PATH: '+p.label+' \u2014 '+p.lead,
         p ? PATH_DESC[ap] : ''].join('\n') : '',
    (S.pain1||S.pain2) ? '\nPAIN POINTS IDENTIFIED:' : '',
    S.pain1   ? '  Primary:   '+S.pain1 : '',
    S.pain2   ? '  Secondary: '+S.pain2 : '',
    S.notes   ? '  Notes:     '+S.notes : '',
    '\nCURRENT BENEFITS:',
    S.medOffered==='no'  ? '  Medical:   Not currently offered' :
    S.medOffered==='yes' ? '  Medical:   '+[S.carrier||'(carrier not entered)',S.erPays?S.erPays+'% ER pays':null,S.renewal?'Renewal '+S.renewal:null,S.deductible?'Ded. '+S.deductible:null,S.oopm?'OOPM '+S.oopm:null].filter(Boolean).join(' | ') : '',
    '  Dental:   '+(S.dentalyn==='yes'?'Yes':S.dentalyn==='no'?'No':'Not recorded'),
    '  Vision:   '+(S.visionyn==='yes'?'Yes':S.visionyn==='no'?'No':'Not recorded'),
    '  Life:     '+(S.lifeyn  ==='yes'?'Yes':S.lifeyn  ==='no'?'No':'Not recorded'),
    '  LTD:      '+(S.ltdyn==='yes'?'Yes \u2014 '+[S.ltdCarrier,S.ltdPct,S.ltdElim,S.ltdDur,S.ltdDef,S.ltdFund].filter(Boolean).join(' | '):S.ltdyn==='no'?'No':'Not recorded'),
    '  STD:      '+(S.stdyn==='yes'?'Yes \u2014 '+[S.std_carrier,S.std_pct,S.std_maxWeekly,S.std_wait,S.std_len,S.std_fund].filter(Boolean).join(' | '):S.stdyn==='no'?'No':'Not recorded'),
    S.totalEE ? '\nWORKFORCE:' : '',
    S.totalEE ? '  Total employees: '+S.totalEE+(S.ft||S.pt?' ('+[S.ft?S.ft+' FT':null,S.pt?S.pt+' PT':null].filter(Boolean).join(', ')+')':'') : '',
    S.tenured ? '  Tenured 12+ mo:  '+S.tenured : '',
    S.payroll ? '  Payroll:         '+S.payroll+(S.payCycle?' \u2014 '+S.payCycle:'') : '',
    gaps.length ? '\nCOVERAGE GAPS IDENTIFIED:' : '',
    ...gaps.map(g=>'  \u2022 '+g.label+' \u2192 '+g.carrier+' ('+g.product+')'),
    allNotes.length ? '\nDISCOVERY NOTES ('+allNotes.length+' captured):' : '',
    ...allNotes,
    '\nNEXT STEPS:',
    S.ec.app      ? '  \u2713 Employer Application completed'        : '  \u25a1 Employer Application pending',
    S.ec.census   ? '  \u2713 Census collected'                       : '  \u25a1 Census needed',
    S.ec.preComm  ? '  \u2713 Pre-enrollment communication agreed'    : '  \u25a1 Pre-enrollment communication TBD',
    S.ec.followup ? '  \u2713 Follow-up meeting booked'               : '  \u25a1 Follow-up meeting not yet scheduled',
    S.enrollDate  ? '  Enrollment date: '+new Date(S.enrollDate+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '',
    S.nextDate    ? '  Next meeting:    '+new Date(S.nextDate+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '',
    S.contactMethod ? '  Contact method:  '+S.contactMethod : '',
    '',
    '='.repeat(50),
    'Channel One Strategies \u2014 channelonestrategies.com',
  ].filter(l => l !== '').join('\n');
  return lines;
}

function saveToDevice(){
  const company = (document.getElementById('fi_company')||{}).value||'Meeting';
  const date = new Date().toLocaleDateString('en-US',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
  const text = buildSummaryText();
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = (company+' - Discovery Summary '+date+'.txt').replace(/[<>:"/\\|?*]/g,'');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

      label:'Confirm everyone who needs to hear this is in the room',
      script:'"Before we get started — is there anyone else who should be part of this conversation?"',

      type:'mtnut', key:'m',
      badge:'M', bcls:'grn', when:'First words',
      label:'Meaningful — open with your purpose, not your product',
      script:'"My goal today isn\'t to sell you a plan. It\'s to understand your biggest business challenges and find out if a benefits solution can actually move the needle for you."',
      why:'Meaningful: ties everything to their business outcome, not your agenda.'
    },
    {
      type:'mtnut', key:'t1',
      badge:'T', bcls:'grn', when:'Right after M',
      label:'Timely — anchor the conversation to what\'s happening right now',
      script:'"Healthcare costs are projected to rise nearly 10% again in 2026 — the third straight year at this level. The way you\'re managing benefits right now matters more than it ever has."',

      badge:'2', bcls:'bl', when:'Check in',
      label:'State your agenda — give them the map of how this conversation goes',
      script:'"Here\'s what I\'d like to do today: first, I want to ask you a few questions about your business. Then, based on what I learn, I\'ll walk you through some options that actually fit your situation. Sound good?"',
      why:'People relax when they know the structure. This removes defensiveness before it starts.'
    },
    {
      type:'mtnut', key:'n',
      badge:'N', bcls:'grn2', when:'After agenda',
      label:'Necessary — frame the cost of doing nothing',
      script:'"Studies show replacing a single employee can cost between 50% and 200% of their annual salary. A benefits package isn\'t an overhead expense — it\'s your retention strategy."',
      why:'Necessary: positions your solution as essential, not optional.'
    },
    {
      type:'mtnut', key:'u',
      badge:'U', bcls:'grn', when:'After N',
      label:'Unique — make clear why you are different from any other broker',
      script:'"Unlike most brokers, I don\'t just shop your renewal with the same carrier. I bring a full technology platform — real-time quoting, side-by-side plan comparison, and a direct connection to your HR and enrollment system. You get options, not just a rate sheet."',
      why:'Unique: they need to know why meeting with you is different from every other broker conversation.'
    },
    {
      type:'confirm', key:'openQ',
      badge:'3', bcls:'bl', when:'Ask permission',
      label:'Get their buy-in before asking anything — this changes the dynamic',
      script:'"To make sure anything I recommend is genuinely relevant to you — would you be open to sharing some insights about your business through a quick collaborative conversation?"',
      why:'Get a "yes" here and discovery becomes a two-way conversation, not an interrogation.'
    },
    {
      type:'mtnut', key:'t2',
      badge:'T', bcls:'grn', when:'After their yes',
      label:'Targeted — make it personal before you ask a single question',
      script:'"Everything I\'m going to ask — and everything I\'ll recommend — is going to be specific to your company, your team, and your goals. This isn\'t a template. It\'s built around you."',
      why:'Targeted: the last thing they hear before discovery starts. Sets the expectation that you\'ll listen before you pitch.'

  const done = steps.filter(s=>ec(s.key)).length;
  const pct = Math.round(done/steps.length*100);

  const rows = steps.map((st,i) => {

    const bgStyle = isMtnut ? 'background:#000;border-color:#111' : 'background:#f6f6f6;border-color:#e0e0e0';
    const labelClr = isMtnut ? 'color:#fff' : 'color:var(--g800)';
    const scriptClr = isMtnut ? 'color:#bbb' : 'color:var(--g500)';

        </div>

  }).join('');

  return `

  </div>
  ${rows}
  <div class="cf" style="margin-top:6px">
    <button class="btn" onclick="sv('phase','discover')"${pct<100?' style="opacity:.7"':''}>
      ${pct===100?'✓ Opening complete — Start Discovery →':'Start Discovery →'}
    </button>
  </div>`;
}

// ── Smart question scoring ─────────────────────────────────────────────────

function scoreQuestions(){
  const d = S;
  const hasMed   = d.medOffered === 'yes';
  const noMed    = d.medOffered === 'no';
  const hasLTD   = d.ltdyn === 'yes';
  const hasSTD   = d.stdyn === 'yes';
  const noDisab  = !hasLTD && !hasSTD;
  const dataIn   = d.medOffered !== '';

  const scores = {};
  const reasons = {};
  function set(n, status, reason){ scores[n]=status; reasons[n]=reason; }

  // Universal questions — always show
  set(1,  'hot',      'Always — business context sets everything up');
  set(2,  'hot',      'Always — surfaces the #1 talent pain in their own words');
  set(3,  hasMed ? 'hot' : 'relevant', hasMed ? 'They have benefits — find out if cost is the top burden' : 'Good financial pain opener');
  set(4,  'hot',      'Always — headcount changes = benefits eligibility changes');
  set(8,  'hot',      'Always — makes them quantify the real cost of losing someone');
  set(9,  'hot',      'Always — surfaces retention reality and tenure');
  set(10, 'hot',      'Always — forces the math on turnover cost');
  set(12, 'hot',      'Always — future-state urgency. Never manufactured.');

  // Conditional on medical offered
  set(5,  noMed  ? 'hot'  : 'skip', noMed  ? 'No benefits — uncover the real barrier (cost vs. complexity vs. size)' : 'Skip — they already offer benefits');
  set(6,  hasMed ? 'hot'  : 'skip', hasMed ? 'Benefits exist — find out what changed and if it is sustainable' : 'Skip — no benefits program to ask about');
  set(7,  hasMed ? (d.dentalyn&&d.visionyn ? 'relevant':'hot') : 'skip',
          hasMed ? 'Benefits exist — communication and participation gaps are almost always there' : 'Skip — no benefits to communicate');

  // STD/LTD dependent
  set(11, noDisab ? 'hot' : 'relevant',
          noDisab ? 'No STD or LTD in place — this opens the disability conversation naturally' : 'Useful even with disability — connects to productivity impact');

  return { scores, reasons, dataIn };
}

// ── ICHRA question scoring — driven entirely by benefits data ───────────────

function scoreICHRA(){
  const d = S;
  const noMed      = d.medOffered === 'no';
  const hasMed     = d.medOffered === 'yes';
  const dataIn     = d.medOffered !== '';
  const small      = parseInt(d.totalEE||0) > 0 && parseInt(d.totalEE||0) < 15;
  const hiring     = parseInt(d.ft||0) > 0 || parseInt(d.pt||0) > 0;
  const hasPartTime= parseInt(d.pt||0) > 0;
  const participating = parseInt(d.participating||0);
  const totalEE    = parseInt(d.totalEE||0);
  const pctPartic  = (participating > 0 && totalEE > 0) ? (participating/totalEE) : null;
  const lowPartic  = pctPartic !== null && pctPartic < 0.75;
  const highCost   = /cost|increas|shift|afford|premium|expens|too much|hurt/.test((d.pain1+d.pain2+d.notes).toLowerCase());
  const retentionPain = /turn|retain|leave|quit|compet|attract|hire|talent/.test((d.pain1+d.pain2+d.notes).toLowerCase());
  const diverseWF  = hasPartTime || (d.ft && d.pt && parseInt(d.ft) !== parseInt(d.totalEE));

  const scores = {};
  const reasons = {};
  function set(n, status, reason){ scores[n]=status; reasons[n]=reason; }

  if (!dataIn) {
    // No data entered yet — show all as unscored
    [1,2,3,4,5,6,7,8].forEach(n => set(n,'unscored','Complete Benefits Data first to see which questions apply'));
    return { scores, reasons, dataIn };
  }

  // Q1 — Fixed budget / no renewal surprise
  if (noMed || highCost) set(1,'hot', noMed ? 'No benefits — cost certainty is the core ICHRA pitch' : 'Cost pain detected — budget predictability is your lead');
  else set(1,'relevant','Good opener regardless — cost control resonates with most employers');

  // Q2 — "If cost/complexity off the table, would you want coverage?"
  if (noMed) set(2,'hot','No benefits — reframes the conversation: if cost were off the table, would you want them covered?');
  else set(2,'skip','Skip — they already offer benefits');

  // Q3 — Portability / employees keep plan when they leave
  if (noMed || retentionPain) set(3,'hot', retentionPain ? 'Retention pain detected — portability reduces COBRA friction for departing employees' : 'No benefits — portability is a key competitive advantage');
  else set(3,'relevant','Worth asking — portability differentiates ICHRA from group plans for any employer');

  // Q4 — Special Enrollment Period
  if (noMed || (dataIn && parseInt(d.totalEE||0) > 0)) set(4,'hot', noMed ? 'No benefits — SEP solves the when can new hires enroll problem immediately' : 'Active hiring — SEP means new hires can enroll any time, not just open enrollment');
  else set(4,'relevant','SEP is always worth mentioning — most employers have never heard this');

  // Q5 — Tax credit stacking
  if (noMed || small) set(5,'hot', small ? 'Small group (under 15) — tax credit stacking can make ICHRA dramatically affordable for their employees' : 'No benefits — premium tax credits on top of ICHRA contribution is often a game-changer');
  else set(5,'relevant','Still worth raising — tax credit awareness is low even among employers with existing benefits');

  // Q6 — Participation waste
  if (hasMed) {
    if (lowPartic) set(6,'hot',`Low participation detected (${Math.round((pctPartic||0)*100)}% enrolled) — they are funding coverage employees are not using`);
    else if (participating === 0) set(6,'hot','No participation data entered — ask directly, this surfaces waste quickly');
    else set(6,'relevant','They have medical — participation efficiency is worth checking');
  } else {
    set(6,'skip','Skip — no group plan to ask about');
  }

  // Q7 — One-size-fits-all / plan personalization
  if (hasMed && diverseWF) set(7,'hot','Mixed FT/PT workforce — diverse employees almost never fit one group plan well');
  else if (hasMed) set(7,'relevant','They have medical — personalization gap is worth surfacing');
  else set(7,'skip','Skip — no group plan to critique');

  // Q8 — Cap spend / budget certainty
  if (hasMed && highCost) set(8,'hot','Cost pain + active benefits = strongest ICHRA pitch. Budget certainty replaces renewal anxiety directly');
  else if (hasMed) set(8,'relevant','They have medical — locking in cost predictability is always relevant at renewal time');
  else set(8,'skip','Skip — no renewal pressure to pivot from');

  return { scores, reasons, dataIn };
}

  ${relevant.map(q=>iCard(q,'relevant')).join('')}`:''}

  ${skipped.length>0?`
  <details style="margin-top:10px">
    <summary style="font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;cursor:pointer;padding:6px 0">
      ⏭ Not applicable based on benefits data (${skipped.length}) ▸
    </summary>
    <div style="margin-top:7px">${skipped.map(q=>iCard(q,'skip')).join('')}</div>
  </details>`:''}

  ${unscored.length>0 ? unscored.map(q=>iCard(q,'unscored')).join('') : ''}`;
}


// ─── GUIDE ───────────────────────────────────────────────────────────────
function guideHTML(){
  const dp = detectPath();
  const ap = S.selPath || dp;
  const p  = ap ? PATHS[ap] : null;
  const pc = p ? p.color : '#0ACE0A';
  const gaps = buildGaps();

  const banner = dp ? `
    <div class="dbanner" style="background:${PATHS[dp].color}12;border-color:${PATHS[dp].color}40">
      <div class="dlbl">Recommended path — based on your discovery notes</div>
      <div class="drow">
        <span class="badge" style="background:${PATHS[dp].color}">${PATHS[dp].label}</span>
        <span class="dtitle">${PATHS[dp].title}</span>
        <span class="dlead" style="color:${PATHS[dp].color}">→ ${PATHS[dp].lead}</span>
      </div>
    </div>` : '';

  // Signals
  const sigs = ap ? buildSignals(ap) : [];
  const sigBox = sigs.length ? `
    <div class="signals" style="background:${pc}0f;border-color:${pc}30;margin-bottom:13px">
      <div class="sh" style="border-color:${pc}30">Signals from your notes that drove this path</div>
      ${sigs.map(s=>`
        <div class="sig-row">
          <span class="sig-tag" style="background:${pc}">${s.src}</span>
          <span class="sig-txt">"${e(s.text)}"</span>
        </div>`).join('')}
    </div>` : (ap ? `<div class="ibar" style="margin-bottom:13px">No notes yet — add responses in the Discover tab to see what drove this path recommendation.</div>` : '');

  const pathGrid = `
    <div class="sh">Select presentation path</div>
    <div class="pgrid">
      ${Object.entries(PATHS).map(([key,path])=>`
        <button class="pcard${ap===key?' on':''}" style="--pc:${path.color};${ap===key?`border-color:${path.color};background:${path.color}12`:''}" onclick="sv('selPath','${key}')">
          <div class="phdr">
            <span class="pbadge" style="background:${path.color}">${path.label}</span>
            <span class="ptitle">${path.title}</span>
          </div>
          <div class="plead">${path.lead}</div>
        </button>`).join('')}
    </div>`;

  let pathContent = '';
  if (ap && p) {
    const pain = (S.pain1||S.pain2) ? `"So your main concerns are ${S.pain1?`"${e(S.pain1)}"`:''} ${S.pain1&&S.pain2?'and':''} ${S.pain2?`"${e(S.pain2)}"`:''}. Did I understand that correctly?"` : '';
    const cars = CARRIERS[ap] || [];

    pathContent = `
      <div class="card gl" style="border-left-color:${pc};margin-bottom:13px">
        <div style="font-size:13px;color:var(--g600);line-height:1.6;margin-bottom:${pain?'9px':'0'}">${PATH_DESC[ap]}</div>
        ${pain?`<div style="font-size:12px;color:var(--g400);font-style:italic;padding:7px;background:var(--g50);border-radius:6px;margin-top:7px">
          Bridge: <span style="color:var(--g800)">${pain}</span>
        </div>`:''}
      </div>

      ${gaps.length ? `
      <div style="font-size:11px;font-weight:700;color:var(--red,#cc3300);text-transform:uppercase;letter-spacing:.07em;padding:6px 0 7px;border-bottom:2px solid #fcc;margin-bottom:9px">
        Coverage gaps identified from benefits data (${gaps.length})
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-bottom:14px">
        ${gaps.map(g=>`<div style="border:1px solid ${g.color}40;border-left:3px solid ${g.color};border-radius:7px;padding:10px 12px;background:${g.color}08">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;background:${g.color};color:#000">${g.priority==='critical'?'CRITICAL':'GAP'}</span>
            <span style="font-size:12px;font-weight:700;color:var(--g800)">${g.label}</span>
          </div>
          <div style="font-size:11px;font-weight:700;color:${g.color};margin-bottom:4px">${g.carrier} \u2014 ${g.product}</div>
          <div style="font-size:11px;color:var(--g500);line-height:1.5">${g.desc}</div>
        </div>`).join('')}
      </div>` : ''}

      <div class="sh">Recommended carriers & solutions for ${PATHS[ap].label}</div>
      <div class="cgrid">
        ${cars.map(c=>`
          <div class="ccard" style="border-top-color:${c.badge||pc}">
            <div class="cname">${c.name}</div>
            <div class="ctype" style="color:${c.badge||pc}">${c.type}</div>
            <div style="font-size:12px;color:var(--g500);line-height:1.55;font-style:italic;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--g100)">${c.highlight||''}</div>
            <ul style="margin:0;padding:0 0 0 13px;font-size:10.5px;color:var(--g500);line-height:1.7">
              ${(c.products||[]).map(pp=>'<li>'+pp+'</li>').join('')}
            </ul>
            ${c.useCase?'<div style="margin-top:7px;padding:4px 7px;background:var(--g50);border-radius:4px;font-size:10px;color:var(--g400);font-weight:600;font-style:italic">USE WHEN: '+c.useCase+'</div>':''}
          </div>`).join('')}
      </div>

      <div class="sh" style="margin-top:4px">Additional carriers available across all paths</div>
      <div class="cgrid" style="margin-bottom:13px">
        ${CARRIER_LIBRARY.map(c=>`
          <div class="ccard" style="border-top-color:${c.badge}">
            <div class="cname">${c.name}</div>
            <div class="ctype" style="color:${c.badge}">${c.type}</div>
            <div style="font-size:12px;color:var(--g500);line-height:1.5;font-style:italic;margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--g100)">${c.highlight}</div>
            <ul style="margin:0;padding:0 0 0 13px;font-size:10.5px;color:var(--g500);line-height:1.7">
              ${(c.products||[]).map(pp=>'<li>'+pp+'</li>').join('')}
            </ul>
            ${c.useCase?'<div style="margin-top:6px;padding:4px 7px;background:var(--g50);border-radius:4px;font-size:10px;color:var(--g400);font-weight:600;font-style:italic">USE WHEN: '+c.useCase+'</div>':''}
          </div>`).join('')}
      </div>

      <div class="card tint">
        <div class="sh">Three options to present</div>
        ${[
          ['Employer-sponsored','Company directly funds specific benefit products. Best for employers committed to a robust, competitive package that signals investment in their people.'],
          ['Defined contribution','Employer sets a fixed monthly amount per employee. Employees choose their own plan. Predictable cost, zero renewal surprises — ICHRA model.'],
          ['Voluntary benefits','Benefits at group rates, 100% employee-funded through payroll deduction. Zero direct ER cost — expands the offering with no new employer spend.'],
        ].map(([t,d],i)=>`
          <div class="orow">
            <div class="onum">${i+1}</div>
            <div><div class="otitle">${t}</div><div class="odesc">${d}</div></div>
          </div>`).join('')}
        <div style="margin-top:9px;padding:8px;background:var(--white);border-radius:6px;font-size:12px;color:var(--g400);font-style:italic">
          "To move forward there are 3 options — [1] employer buys for each employee, [2] employer makes a defined contribution, or [3] employer simply makes benefits available through payroll deduction at no direct cost. Which scenario fits your company best?"
        </div>
      </div>`;
  }

  return banner + sigBox + pathGrid + pathContent + `<div class="cf"><button class="btn" onclick="sv('phase','execute')">Move to Execute →</button></div>`;
}

// ─── EXECUTE ─────────────────────────────────────────────────────────────
function executeHTML(){
  const company = (document.getElementById('fi_company')||{}).value || '';
  const ap = S.selPath || detectPath();
  const p  = ap ? PATHS[ap] : null;

  const summary = (company||S.pain1||ap) ? `
    <div class="card gl" style="margin-top:12px">
      <div class="sh">Meeting summary${company?' — '+e(company):''}</div>
      <div class="srow">
        ${ap&&p?`<div><strong>Recommended path:</strong> ${p.label} — ${p.lead}</div>`:''}
        ${S.pain1?`<div><strong>Primary pain:</strong> ${e(S.pain1)}</div>`:''}
        ${S.pain2?`<div><strong>Secondary pain:</strong> ${e(S.pain2)}</div>`:''}
        ${S.totalEE?`<div><strong>Group size:</strong> ${e(S.totalEE)} employees</div>`:''}
        ${S.carrier&&S.medOffered==='yes'?`<div><strong>Current carrier:</strong> ${e(S.carrier)}${S.renewal?' · Renewal: '+e(S.renewal):''}</div>`:''}
        ${S.medOffered==='no'?`<div class="shighlight">→ No current benefits — strong ICHRA / voluntary opportunity</div>`:''}
        ${S.nextDate?`<div><strong>Next meeting:</strong> ${new Date(S.nextDate+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>`:''}
      </div>
    </div>` : '';

  return `
  <div class="egrid">
    <div class="card">
      <div class="sh">Execute checklist</div>
      ${[
        ['app',    'Employer Application completed (15–20 min)'],
        ['census', 'Census collected or scheduled'],
        ['preComm','Pre-enrollment communication strategy agreed'],
        ['followup','Follow-up meeting booked — calendar confirmed'],
      ].map(([k,t])=>`
        <label class="chkrow${S.ec[k]?' done':''}">
          <input type="checkbox" ${S.ec[k]?'checked':''} onchange="se('${k}',this.checked)" style="accent-color:var(--green);width:14px;height:14px;flex-shrink:0">
          <span>${t}</span>
        </label>`).join('')}
      <div style="margin-top:11px">
        ${field('Enrollment date', `<input class="inp" type="date" value="${e(S.enrollDate)}" onchange="sv('enrollDate',this.value)">`)}
        ${field('Best way to reach employees', inp('contactMethod',S.contactMethod,'e.g. Monday all-hands'))}
        ${field('Next meeting date', `<input class="inp" type="date" value="${e(S.nextDate)}" onchange="sv('nextDate',this.value)">`)}
      </div>
    </div>
    <div class="card">
      <div class="sh">Objection responses</div>
      ${[
        ['"We can\'t afford benefits"',   '"83% of new ICHRA adopters had never offered benefits — they thought they couldn\'t. Let me show you what zero-to-low cost actually looks like."'],
        ['"Our employees don\'t want it"','"68% of employees without voluntary life say they would buy it if offered. Most don\'t ask because they assume it isn\'t available."'],
        ['"We already have a broker"',    '"I\'m not here to replace that relationship — I\'m here to show you what\'s possible with tools most brokers don\'t have. If the outcome is better, the relationship tends to follow."'],
        ['"I need to think about it"',   '"Absolutely. What specifically? I can schedule our follow-up around that one question."'],
      ].map(([obj,resp])=>`
        <div class="oitem">
          <div class="oq">${obj}</div>
          <div class="oa">${resp}</div>
        </div>`).join('')}
    </div>
  </div>
  ${summary}
  <div style="margin-top:20px;padding-top:16px;border-top:2px solid var(--green);text-align:center">
    <div style="font-size:12px;color:var(--g400);margin-bottom:10px">All done? Generate a meeting summary and email it to yourself or the employer contact.</div>
    <button onclick="sv('phase','finish')" style="background:var(--green);color:#000;border:none;padding:12px 32px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.02em">
      &#10003;&nbsp; Finish &amp; Save Meeting Summary
    </button>
  </div>
`;
}

// ─── Init ────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
